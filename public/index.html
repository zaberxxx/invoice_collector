<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ee">
    <title>統編發票記錄</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">統編發票記錄</p>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden title="安裝到手機">
          <span aria-hidden="true">＋</span>
        </button>
      </header>

      <section class="summary-strip" aria-label="加總摘要">
        <div><span>納入張數</span><strong id="includedCount">0</strong></div>
        <div><span>加總金額</span><strong id="includedTotal">$0</strong></div>
      </section>

      <nav class="tabs" aria-label="主要功能">
        <button class="tab is-active" type="button" data-tab="scan">掃描</button>
        <button class="tab" type="button" data-tab="records">記錄</button>
        <button class="tab" type="button" data-tab="settings">設定</button>
      </nav>

      <section class="panel is-active" id="scanPanel">
        <div class="scan-form">
          <div class="camera-panel is-idle" id="cameraPanel">
            <video id="cameraPreview" playsinline muted></video>
            <canvas id="cameraFreeze" class="camera-freeze" hidden></canvas>
            <div class="camera-status" id="cameraStatus">準備開啟相機</div>
          </div>
        </div>

        <form id="reviewForm" class="review-form">
          <div class="review-grid">
            <label class="review-field">發票號碼<input id="invoiceNumber" name="invoiceNumber" autocomplete="off" placeholder="AA12345678"></label>
            <label class="review-field">發票日期<input id="invoiceDate" name="invoiceDate" type="date"></label>
            <label class="review-field">單張總金額<input id="totalAmount" name="totalAmount" inputmode="numeric" pattern="[0-9]*" placeholder="0"></label>
            <div class="review-field">
              <span>統編</span>
              <div class="check-row tax-result">
                <span id="taxIdValue">未辨識</span>
                <strong id="taxIdResult">未確認</strong>
              </div>
            </div>
          </div>
          <input id="buyerTaxId" name="buyerTaxId" type="hidden">
          <div class="warning" id="duplicateWarning" hidden></div>
          <div class="actions">
            <button class="primary" type="submit">儲存記錄</button>
            <button class="secondary" id="clearReviewButton" type="button">清除</button>
          </div>
          <button class="primary icon-scan-button" id="liveScanButton" type="button" aria-label="即時掃描 QR" title="即時掃描 QR">
            <svg class="scan-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h1.2l1-1.5h6.6l1 1.5h1.2A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z"></path>
              <circle cx="12" cy="12" r="3.4"></circle>
            </svg>
          </button>
          <button class="secondary" id="manualButton" type="button">手動新增</button>
        </form>
      </section>

      <section class="panel" id="recordsPanel">
        <div class="toolbar">
          <button class="secondary" id="exportButton" type="button">更新匯出檔</button>
          <button class="secondary danger" id="clearRecordsButton" type="button">清除全部</button>
          <label class="file-button">匯入既有檔<input id="importInput" type="file" accept=".csv,text/csv"></label>
        </div>
        <div id="recordList" class="record-list"></div>
      </section>

      <section class="panel" id="settingsPanel">
        <form id="settingsForm" class="settings-form">
          <label>指定統編<input id="targetTaxId" inputmode="numeric" pattern="[0-9]{8}" placeholder="請輸入 8 位數統編"></label>
          <label>固定匯出檔名<input id="exportFilename" value="invoice-summary.csv"></label>
          <button class="primary" type="submit">儲存設定</button>
        </form>
        <p class="note">iPhone/iPad 會下載或分享同一個固定檔名；存入 iCloud Drive 時請選擇取代原檔，App 內資料會持續更新同一份主記錄。</p>
      </section>
      <p class="app-version" id="appVersion">版本讀取中</p>
    </main>

    <div class="toast" id="toast" role="status" hidden></div>
    <script src="./zxing.js"></script>
    <script src="./jsQR.js"></script>
    <script src="./qr-fallback.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
